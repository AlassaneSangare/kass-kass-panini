<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KASS-KASS PANINI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* RESET */
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family:'Poppins', sans-serif;
    background:#0f0f0f;
    color:white;
}

/* LOADER */
#loader {
    position:fixed;
    width:100%;
    height:100%;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999;
}

.loader-circle {
    width:50px;
    height:50px;
    border:5px solid #333;
    border-top:5px solid #ffcc00;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin { 100% { transform:rotate(360deg);} }

/* HEADER */
header {
    padding:20px;
    text-align:center;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
}

/* MENU */
.menu { padding:15px; }

.item {
    display:flex;
    align-items:center;
    background:rgba(255,255,255,0.05);
    border-radius:15px;
    padding:10px;
    margin-bottom:12px;
}

.item img {
    width:70px;
    height:70px;
    border-radius:10px;
    object-fit:cover;
    margin-right:10px;
}

.item-info { flex:1; }

button {
    border:none;
    padding:6px 10px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

/* boutons */
.btn-add { background:#ffcc00; }
.btn-remove { background:#ff4d4d; color:white; }

/* BADGE */
.badge {
    position:fixed;
    top:15px;
    right:15px;
    background:#ffcc00;
    color:black;
    border-radius:50%;
    padding:8px 12px;
}

/* CART */
.cart {
    position:fixed;
    bottom:0;
    width:100%;
    background:rgba(0,0,0,0.9);
    padding:15px;
}

.cart button {
    width:100%;
    margin-top:10px;
}

/* animation */
.added { animation:pop 0.3s; }
@keyframes pop { 50% { transform:scale(1.2);} }

</style>
</head>

<body>

<div id="loader"><div class="loader-circle"></div></div>

<div class="badge" id="badge">0</div>

<header>
    <h1>KASS-KASS PANINI</h1>
    <p>Le panini qui réveille 🔥</p>
</header>

<section class="menu">

<!-- PRODUITS -->

<div class="item">
<img src="1.jpeg">
<div class="item-info"><h3>Panini Poulet</h3><p>2000F</p></div>
<button class="btn-remove" onclick="removeFromCart('Panini Poulet',2000)">-</button>
<button class="btn-add" onclick="addToCart('Panini Poulet',2000,this)">+</button>
</div>

<div class="item">
<img src="4.jpeg">
<div class="item-info"><h3>Panini Viande</h3><p>1500F</p></div>
<button class="btn-remove" onclick="removeFromCart('Panini Viande',1500)">-</button>
<button class="btn-add" onclick="addToCart('Panini Viande',1500,this)">+</button>
</div>

<div class="item">
<img src="https://images.unsplash.com/photo-1553909489-cd47e0907980">
<div class="item-info"><h3>Sandwich</h3><p>1500F</p></div>
<button class="btn-remove" onclick="removeFromCart('Sandwich',1500)">-</button>
<button class="btn-add" onclick="addToCart('Sandwich',1500,this)">+</button>
</div>

<div class="item">
<img src="https://images.unsplash.com/photo-1551183053-bf91a1d81141">
<div class="item-info"><h3>Omelette</h3><p>+500F</p></div>
<button class="btn-remove" onclick="removeFromCart('Omelette',500)">-</button>
<button class="btn-add" onclick="addToCart('Omelette',500,this)">+</button>
</div>

<div class="item">
<img src="https://images.unsplash.com/photo-1544145945-f90425340c7e">
<div class="item-info"><h3>Boisson</h3><p>500F</p></div>
<button class="btn-remove" onclick="removeFromCart('Boisson',500)">-</button>
<button class="btn-add" onclick="addToCart('Boisson',500,this)">+</button>
</div>

</section>

<section class="cart">
<p>Total : <span id="total">0</span> F</p>

<button onclick="sendWhatsApp()">Commander via WhatsApp</button>

<button onclick="clearCart()" style="background:#ff4d4d; color:white;">
    Vider le panier 🗑
</button>
</section>

<script>

let cart = {};
let total = 0;
let count = 0;

/* LOADER */
window.onload = () => {
    setTimeout(() => {
        document.getElementById("loader").style.display = "none";
    }, 1000);
};

/* ADD */
function addToCart(name, price, btn) {

    if (!cart[name]) cart[name] = {price, qty:0};

    cart[name].qty++;
    total += price;
    count++;

    updateUI();

    btn.classList.add("added");
    setTimeout(()=>btn.classList.remove("added"),300);
}

/* REMOVE */
function removeFromCart(name, price) {

    if (!cart[name]) return;

    cart[name].qty--;
    total -= price;
    count--;

    if (cart[name].qty <= 0) delete cart[name];

    updateUI();
}

/* CLEAR */
function clearCart() {

    if (count === 0) return;

    if (!confirm("Voulez-vous vider le panier ?")) return;

    cart = {};
    total = 0;
    count = 0;

    updateUI();
}

/* UPDATE UI */
function updateUI() {
    document.getElementById("total").textContent = total;
    document.getElementById("badge").textContent = count;
}

/* WHATSAPP */
function sendWhatsApp() {

    if (count === 0) {
        alert("Panier vide !");
        return;
    }

    let message = "Commande Kass-Kass Panini:%0A";

    for (let item in cart) {
        message += `- ${item} x${cart[item].qty}%0A`;
    }

    message += "Total: " + total + "F";

    let url = `https://wa.me/22375111212?text=${message}`;
    window.open(url, "_blank");
}

</script>

</body>
</html>
